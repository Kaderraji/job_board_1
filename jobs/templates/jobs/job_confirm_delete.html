{% extends 'jobs/base.html' %}
{% block title %}Confirm Delete | Job Board{% endblock %}
{% block content %}
<h2>Delete Job</h2>
<p>Are you sure you want to delete the job "{{ job.title }}"?</p>
<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Yes, delete</button>
  <a class="btn btn-secondary" href="{% url 'job_detail' job.id %}">Cancel</a>
</form>
{% endblock %}
